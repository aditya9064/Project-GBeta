steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['pull', 'docker.io/n8nio/n8n:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'docker.io/n8nio/n8n:latest', 'us-central1-docker.pkg.dev/gbeta-a7ea6/crewos-images/automation-engine:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/gbeta-a7ea6/crewos-images/automation-engine:latest']
images:
  - 'us-central1-docker.pkg.dev/gbeta-a7ea6/crewos-images/automation-engine:latest'
