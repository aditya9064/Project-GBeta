<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OperonAI — AI Agents for Business</title>
    <meta name="description" content="AI agents for business. Lower costs and automate workflows with intelligent agents that work for you." />
    <style>
      html { visibility: hidden; }
      html.loaded { visibility: visible; }
    </style>
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.classList.add('loaded');
      })();
    </script>
    <script>
      /* Agent-Server Sync Bridge v3 — full bidirectional sync */
      (function(){
        var API='/api/agents';
        var UID='demo-user-123';

        function syncAll(){
          fetch(API+'?userId='+UID).then(function(r){return r.json()}).then(function(res){
            if(!res.success||!res.data)return;
            var serverAgents=res.data;
            var localAgents=JSON.parse(localStorage.getItem('demo_agents')||'[]');
            var localIds=new Set(localAgents.map(function(a){return a.id}));
            var serverIds=new Set(serverAgents.map(function(a){return a.id}));
            var changed=false;

            /* 1. Push local agents to server */
            localAgents.forEach(function(a){
              if(serverIds.has(a.id))return;
              if(a.status!=='active'&&a.status!=='paused')return;
              var tn=(a.workflow&&a.workflow.nodes||[]).find(function(n){return n.type==='trigger'});
              var tt=tn&&tn.config?tn.config.triggerType||'manual':'manual';
              fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
                id:a.id,name:a.name,description:a.description||'',
                workflow:a.workflow,triggerType:tt,triggerConfig:tn?tn.config:{},userId:UID
              })}).then(function(r){return r.json()}).then(function(r){
                if(r.success)console.log('[sync] Pushed to server:',a.name);
              }).catch(function(){});
            });

            /* 2. Pull server agents into localStorage */
            serverAgents.forEach(function(sa){
              if(localIds.has(sa.id))return;
              var now=new Date().toISOString();
              var newLocal={
                id:sa.id, userId:sa.userId||UID, name:sa.name,
                description:sa.description||'', icon:'Zap', color:'#e07a3a',
                workflow:sa.workflow, status:sa.status||'active',
                triggerType:sa.triggerType||'manual',
                totalExecutions:sa.executionCount||0,
                successfulExecutions:sa.executionCount-(sa.errorCount||0),
                failedExecutions:sa.errorCount||0,
                createdAt:sa.createdAt||now, updatedAt:sa.updatedAt||now,
                deployedAt:sa.createdAt||now,
                lastExecutedAt:sa.lastExecutedAt||null,
                lastExecutionStatus:sa.executionCount>0?(sa.errorCount>0?'failed':'completed'):null,
                settings:{retryOnFailure:true,maxRetries:3,notifyOnFailure:false,timeout:300},
                memoryEnabled:false, capabilities:['server-agent']
              };
              localAgents.push(newLocal);
              changed=true;
              console.log('[sync] Pulled from server:',sa.name,'('+sa.id+')');
            });

            if(changed){
              localStorage.setItem('demo_agents',JSON.stringify(localAgents));
            }

            /* 3. Fetch logs for ALL agents (local + server) */
            var allAgents=localAgents;
            var history=JSON.parse(localStorage.getItem('demo_executions')||'{}');
            var logsChanged=false;
            var pending=allAgents.length;
            if(pending===0)return;

            allAgents.forEach(function(a){
              fetch(API+'/'+a.id+'/logs?limit=20').then(function(r){return r.json()}).then(function(lr){
                if(!lr.success||!lr.data||!lr.data.length)return;
                var existing=history[a.id]||[];
                var existingIds=new Set(existing.map(function(e){return e.id}));
                var newLogs=lr.data.filter(function(l){return !existingIds.has(l.id)});
                if(newLogs.length>0){
                  var converted=newLogs.map(function(r){
                    return {
                      id:r.id,agentId:r.agentId,userId:r.userId,
                      status:r.status,triggeredBy:r.trigger||'server',
                      triggerData:r.triggerData,
                      startedAt:r.startedAt,completedAt:r.completedAt,
                      duration:r.durationMs||0,
                      nodeExecutions:(r.logs||[]).map(function(l){
                        return {nodeId:l.nodeId,nodeName:l.nodeName,nodeType:l.nodeType,
                          status:l.status,startedAt:l.startedAt,completedAt:l.completedAt,
                          duration:l.durationMs||0,input:l.input,output:l.output,error:l.error};
                      }),
                      output:r.output,
                      error:r.error?{nodeId:'server',message:r.error}:undefined
                    };
                  });
                  history[a.id]=[].concat(converted,existing).sort(function(x,y){
                    return new Date(y.startedAt)-new Date(x.startedAt);
                  }).slice(0,50);
                  logsChanged=true;
                  console.log('[sync]',newLogs.length,'new logs for',a.name);

                  /* Update agent stats */
                  var agentList=JSON.parse(localStorage.getItem('demo_agents')||'[]');
                  var idx=agentList.findIndex(function(x){return x.id===a.id});
                  if(idx>=0){
                    agentList[idx].totalExecutions=history[a.id].length;
                    agentList[idx].successfulExecutions=history[a.id].filter(function(e){return e.status==='completed'}).length;
                    agentList[idx].failedExecutions=history[a.id].filter(function(e){return e.status==='failed'}).length;
                    agentList[idx].lastExecutedAt=history[a.id][0].startedAt;
                    agentList[idx].lastExecutionStatus=history[a.id][0].status;
                    localStorage.setItem('demo_agents',JSON.stringify(agentList));
                  }
                }
              }).catch(function(){}).finally(function(){
                pending--;
                if(pending<=0&&logsChanged){
                  localStorage.setItem('demo_executions',JSON.stringify(history));
                }
              });
            });
          }).catch(function(){});
        }

        setTimeout(syncAll,1500);
        setInterval(syncAll,8000);
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-DsAVOxt3.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DY39Kgkg.css">
  </head>

    <div id="root"></div>
  </body>
</html>
